# ==================== D2 Potency Project 统一配置文件 ====================

# --------------------------------------------------
# 1. 全局与共享配置 (Shared Globals)
# --------------------------------------------------
misc:
  random_seed: 42                # 全局随机种子 (保证可复现性与消融实验基准)

# ==================================================
# 所有路径统一存放在一个 paths 顶层键下，用注释分块
# ==================================================
paths:
  # --- 全局/共享路径 ---
  md_data_dir: "../MD_data"      # 外部原始数据 (绝对不入 Git)
  gpcr_db: "data/gpcr_db.yaml"   # 序列比对数据库 (Boltz 推理受体识别)

  # --- 特征提取阶段路径 ---
  reference_pdb: "data/step5_input.pdb" # 刚性对齐的参考构象
  fea_result_dir: "data/features"           # 提取出的图特征 (.pt) 保存目录

  # --- 模型训练阶段路径 ---
  label_file: "data/labels.csv"             # 真实效能标签
  model_path: "checkpoints/saved_models"    # 模型权重保存目录

# --------------------------------------------------
# 2. 特征提取阶段 (Feature Extraction)
# --------------------------------------------------
data:
  integration_radius: 1.5        # QM 密度积分半径 (Å)

residues:
  # OBP (Binding Pocket) - 参与图节点构建的全原子残基
  obp_residues: ["3.32", "3.33", "3.36", "3.37",
                 "5.39", "5.42", "5.43", "5.46", 
                 "6.48", "6.51", "6.52", "6.55", 
                 "7.39", "7.43"]
  
  # 疏水核心平面残基 - 负责计算受体端平面法向量
  phe_residues: ["6.51", "6.52"] 
  
  # 极性锚点 - 负责基于化学属性的 Spatial Attention 衰减
  polar_anchors: ["5.42", "5.46", "6.55"]


# --------------------------------------------------
# 3. 模型架构配置 (EGNN Architecture)
# --------------------------------------------------
model:
  node_in_dim: 25                # 节点输入特征维度 (物理化学属性+QM权重+Clash等)
  global_dim: 3                  # 全局特征维度 (几何角度与偏心率)
  hidden_dim: 64                 # 隐藏层维度
  n_layers: 4                    # EGNN 消息传递层数
  dropout_rate: 0.1              # MLP 头的 Dropout 比例
  graph_radius: 5.0              # 动态建图的截断半径 (Å)


# --------------------------------------------------
# 4. 训练阶段配置 (Training Phase)
# --------------------------------------------------
training: 
  # 训练循环参数
  num_epochs: 30
  batch_size: 32
  # optimizer 参数
  learning_rate: 0.001
  weight_decay: 1e-3
  # scheduler 参数
  factor: 0.5
  patience: 5